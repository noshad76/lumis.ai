services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: lumis-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: lumis-ollama
    ports:
      - "11434:11434"
    volumes:
      - C:/Users/Amir Hossein/.ollama/models:/root/.ollama/models
      - ollama_data:/root/.ollama
    # --- این بخش را اضافه کن ---
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # ---------------------------
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  qdrant_data:
  ollama_data:
